<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Velux KLF-200 Plugin">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2233"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#74c0fc"/>
      <stop offset="100%" stop-color="#1c7ed6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- window frame -->
  <rect x="112" y="112" width="288" height="288" rx="16" fill="#3a4150" stroke="#e9ecef" stroke-width="6"/>
  <!-- sky pane -->
  <rect x="132" y="132" width="248" height="200" fill="url(#sky)"/>
  <!-- mullion + transom -->
  <rect x="252" y="132" width="8" height="200" fill="#e9ecef"/>
  <rect x="132" y="228" width="248" height="8" fill="#e9ecef"/>
  <!-- shutter slats lower section -->
  <g fill="#adb5bd">
    <rect x="132" y="340" width="248" height="14" rx="3"/>
    <rect x="132" y="362" width="248" height="14" rx="3"/>
    <rect x="132" y="384" width="248" height="14" rx="3" opacity="0.7"/>
  </g>
  <!-- sun -->
  <circle cx="320" cy="180" r="22" fill="#ffd43b"/>
</svg>
